<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAFAS INDONESIA</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; min-height: 100%; background: #0a061a; font-family: 'Montserrat', sans-serif; color: white; overflow-x: hidden; }
        
        /* STYLE LOGIN */
        #loginScreen { position: fixed; inset: 0; background: #0a061a; z-index: 99999; display: flex; justify-content: center; align-items: center; }
        .login-box { width: 90%; max-width: 350px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 30px 25px; text-align: center; }
        .login-box h2 { font-family: 'Orbitron', sans-serif; color: #00e5ff; margin-bottom: 5px; }
        .login-box p { font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 25px; }
        .login-input { width: 100%; padding: 12px 15px; margin-bottom: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: white; outline: none; }
        .btn-login { width: 100%; padding: 14px; border: none; border-radius: 12px; background: linear-gradient(90deg, #8e2de2, #f00073); color: white; font-weight: bold; font-family: 'Orbitron'; font-size: 16px; cursor: pointer; }

        .page { display: none; width: 100%; min-height: 100vh; justify-content: center; align-items: center; padding: 20px 10px; }
        .page.active { display: flex; }
        .main-wrapper { width: 100%; max-width: 320px; height: 85vh; display: flex; flex-direction: column; justify-content: space-between; text-align: center; }
        .logo-container { width: 110px; height: 110px; margin: 0 auto 10px; display: flex; justify-content: center; align-items: center; cursor: pointer; border-radius: 50%; border: 1px dashed rgba(255,255,255,0.2); overflow: hidden; position: relative; }
        .logo-container img { width: 100%; height: 100%; object-fit: cover; }
        h2 { margin: 10px 0 2px; font-family: 'Orbitron', sans-serif; font-size: 1.2rem; font-weight: 700; color: white; letter-spacing: 2px; }
        .subtitle { margin: 0; font-size: 0.8rem; color: rgba(255,255,255,0.45); letter-spacing: 1.5px; font-weight: 600; }
        .line { width: 80%; margin: 15px auto; height: 1px; background: rgba(255, 255, 255, 0.1); }
        .btn-masuk { background: linear-gradient(90deg, #8e2de2, #f00073); border: none; border-radius: 35px; color: white; padding: 14px 0; width: 85%; font-weight: bold; font-size: 1.1rem; box-shadow: 0 8px 25px rgba(240, 0, 115, 0.4); cursor: pointer; font-family: 'Orbitron', sans-serif; }
        .feature-title { font-size: 0.75rem; color: rgba(255,255,255,0.3); margin-bottom: 20px; display: block; font-weight: 700; letter-spacing: 1px; }
        
        .icon-grid { display: flex; justify-content: center; gap: 15px; }
        .icon-item { display: flex; flex-direction: column; align-items: center; gap: 8px; width: 62px; cursor: pointer; }
        .icon-box { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 15px; 
            width: 42px; 
            height: 42px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-size: 1.2rem; 
            color: #00e5ff; 
        }
        .icon-label { font-size: 0.55rem; color: rgba(255,255,255,0.85); font-weight: 700; text-transform: uppercase; line-height: 1.2; }

        .footer { margin-top: 50px; font-size: 0.55rem; color: rgba(255,255,255,0.2); letter-spacing: 0.5px; font-weight: 400; }
        .app-container { width: 100%; max-width: 420px; background: rgba(88, 40, 140, 0.20); border-radius: 28px; padding: 22px 18px 26px; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 0 40px rgba(0,0,0,0.55); }
        .member-top { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.10); border-radius: 18px; padding: 14px; margin-bottom: 14px; text-align: center; }
        .member-top h3 { font-size: 22px; font-weight: 900; margin-bottom: 4px; color: #00e5ff; letter-spacing: 1px; font-family: 'Orbitron', sans-serif; }
        .member-top p { font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 12px; font-weight: bold; }
        .search-input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.10); background: rgba(0,0,0,0.25); color: #fff; outline: none; margin-bottom: 12px; }
        .top-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .top-buttons button { border: none; border-radius: 12px; padding: 12px 0; font-weight: 900; color: #fff; cursor: pointer; font-size: 11px; font-family: 'Orbitron', sans-serif; }
        .member-card { background: rgba(40, 14, 70, 0.70); border: 1px solid rgba(255,255,255,0.10); border-radius: 22px; padding: 16px 14px 18px; margin-bottom: 16px; text-align: left; }
        .member-header { display: flex; align-items: flex-start; gap: 12px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.12); margin-bottom: 12px; }
        .photo-ring { width: 86px; height: 86px; border-radius: 50%; position: relative; flex-shrink: 0; display: flex; justify-content: center; align-items: center; }
        .photo-ring::before { content: ""; position: absolute; inset: -4px; border-radius: 50%; background: conic-gradient(#00e5ff,#8a2be2,#ff4fd8,#00e5ff); z-index: -1; }
        .photo-ring img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid rgba(0,0,0,0.55); }
        .member-name h4 { font-size: 20px; font-weight: 900; line-height: 1.05; margin-bottom: 4px; color: #fff; }
        .member-name .id { color: #00e5ff; font-weight: 900; font-size: 14px; }
        .member-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 16px; font-size: 13px; }
        .field label { display: block; font-size: 10px; font-weight: 800; color: rgba(255,255,255,0.35); margin-bottom: 4px; text-transform: uppercase; }
        .field div { font-weight: 900; font-size: 14px; color: #eee; }
        .field.full { grid-column: 1 / -1; }
        .komitmen-box { margin-top: 14px; background: rgba(255,255,255,0.06); border-radius: 16px; padding: 14px; }
        .komitmen-box h5 { font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 5px; }
        .komitmen-box p { font-weight: 900; font-size: 13px; color: #fff; }
        .icon-actions { margin-top: 14px; display: flex; justify-content: space-between; gap: 8px; }
        .icon-btn { flex: 1; background: rgba(255,255,255,0.08); border-radius: 16px; padding: 8px; text-align: center; cursor: pointer; }
        .icon-btn img { width: 30px; height: 30px; display: block; margin: 0 auto 4px; }
        .icon-btn span { display: block; font-weight: 900; font-size: 10px; }
        .member-buttons { margin-top: 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-wide { grid-column: 1 / -1; border: none; border-radius: 14px; padding: 12px; font-weight: 900; background: #12aee0; color: #fff; cursor: pointer; font-family: 'Orbitron', sans-serif; font-size: 11px; }
        .btn-edit { border: none; border-radius: 14px; padding: 12px; font-weight: 900; background: #caa10b; color: #fff; cursor: pointer; font-family: 'Orbitron', sans-serif; font-size: 11px; }
        .btn-hapus { border: none; border-radius: 14px; padding: 12px; font-weight: 900; background: #d92c2c; color: #fff; cursor: pointer; font-family: 'Orbitron', sans-serif; font-size: 11px; }
        .btn-kembali { grid-column: 1 / -1; border: 2px solid rgba(255,255,255,0.3); border-radius: 14px; padding: 12px; font-weight: 900; background: transparent; color: #fff; cursor: pointer; margin-top: 5px; text-transform: uppercase; letter-spacing: 1px; font-family: 'Orbitron', sans-serif; font-size: 11px; }
        .overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; padding: 20px; z-index: 9999; }
        .overlay.active { display: flex; }
        .popup-box { width: 90%; max-width: 350px; background: #161225; border-radius: 25px; padding: 20px; text-align: center; }
        .popup-title { font-family: 'Orbitron', sans-serif; font-size: 1rem; color: #00e5ff; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; }
        .popup-text { width: 100%; height: 200px; background: #000; border: 1px solid #333; border-radius: 15px; color: #fff; padding: 15px; font-size: 14px; margin-bottom: 20px; outline: none; resize: none; }
        .modal-form { width: 100%; max-width: 400px; background: #2a0e4a; border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.15); max-height: 90vh; overflow-y: auto; color: white; }
        .form-group { margin-bottom: 12px; text-align: left; }
        .form-group label { display: block; font-size: 11px; color: rgba(255,255,255,0.5); margin-bottom: 4px; font-weight: bold; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: #fff; outline: none; font-size: 14px; }
        .btn-action { border: none; padding: 10px 15px; border-radius: 10px; font-size: 10px; font-weight: bold; cursor: pointer; color: white; font-family: 'Orbitron', sans-serif; }
    </style>
</head>
<body>
    <div id="loginScreen">
        <div class="login-box">
            <h2>LOGIN ADMIN</h2>
            <p>Masukkan Username & Password</p>
            <input type="text" id="user" class="login-input" placeholder="Username">
            <input type="password" id="pass" class="login-input" placeholder="Password">
            <button class="btn-login" onclick="cekLogin()">MASUK</button>
        </div>
    </div>

    <div id="pageBeranda" class="page">
        <div class="main-wrapper">
            <div class="top-group">
                <div class="logo-container" id="logoBtn">
                    <div id="logoDisplay"><span id="logoPlaceholder">Pasang Logo</span></div>
                </div>
                <h2>NAFAS INDONESIA</h2>
                <p class="subtitle">NEW AMEL FANS SEJATI</p>
                <div class="line"></div>
            </div>
            <div class="middle-group">
                <button class="btn-masuk" onclick="showPage('pageMember')">MEMBER</button>
            </div>
            <div class="bottom-group">
                <span class="feature-title">MENU LAYANAN GROUP</span>
                <div class="icon-grid">
                    <div class="icon-item" onclick="openPopup('TATA TERTIB')">
                        <div class="icon-box"><i class="fas fa-gavel"></i></div>
                        <span class="icon-label">TATA<br>TERTIB</span>
                    </div>
                    <div class="icon-item" onclick="openPopup('PROFIL')">
                        <div class="icon-box"><i class="fas fa-user"></i></div>
                        <span class="icon-label">PROFIL</span>
                    </div>
                    <div class="icon-item" onclick="openPopup('MEDSOS')">
                        <div class="icon-box"><i class="fas fa-share-nodes"></i></div>
                        <span class="icon-label">MEDSOS</span>
                    </div>
                    <div class="icon-item" onclick="openPopup('STRUKTUR')">
                        <div class="icon-box"><i class="fas fa-sitemap"></i></div>
                        <span class="icon-label">STRUKTUR</span>
                    </div>
                </div>
                <div class="footer">© NAFAS INDONESIA COMMUNITY</div>
            </div>
        </div>
    </div>
    <div id="pageMember" class="page">
        <div class="app-container">
            <div class="member-top">
                <h3>DATABASE MEMBER</h3>
                <p>NEW AMEL FANS SEJATI</p>
                <input class="search-input" id="searchMember" placeholder="Cari Member..." oninput="renderMembers()"/>
                <div class="top-buttons">
                    <button style="background:#d92c2c" onclick="resetFoto()">RESET FOTO</button>
                    <button style="background:#1faa58" onclick="openFormTambah()">TAMBAH</button>
                    <button style="background:#2367ff" onclick="exportCSV()">EXPORT CSV</button>
                    <button style="background:#444" onclick="showPage('pageBeranda')">KEMBALI</button>
                </div>
            </div>
            <div id="memberList"></div>
        </div>
    </div>

    <div class="overlay" id="popupOverlay">
        <div class="popup-box">
            <h3 id="popupTitleLabel" class="popup-title">JUDUL</h3>
            <textarea id="popupText" class="popup-text" readonly></textarea>
            <div style="display:flex; justify-content:center; gap:10px;">
                <button class="btn-action" style="background:#f39c12" onclick="enableEdit()">EDIT</button>
                <button class="btn-action" style="background:#27ae60" onclick="saveDataPopup()">SIMPAN</button>
                <button class="btn-action" style="background:#c0392b" onclick="closePopup()">TUTUP</button>
            </div>
        </div>
    </div>

    <div class="overlay" id="formOverlay">
        <div class="modal-form">
            <h2 id="formTitle" style="font-family:'Orbitron'; font-size:18px; margin-bottom:15px; text-align:center;">TAMBAH MEMBER</h2>
            <input type="hidden" id="editIndex">
            <div class="form-group"><label>NAMA</label><input type="text" id="f_nama"></div>
            <div class="form-group"><label>ID</label><input type="text" id="f_id"></div>
            <div class="form-group"><label>NOMOR HP</label><input type="text" id="f_hp"></div>
            <div class="form-group"><label>TTL</label><input type="text" id="f_ttl"></div>
            <div class="form-group"><label>JENIS KELAMIN</label>
                <select id="f_jk"><option value="Laki-Laki">Laki-Laki</option><option value="Perempuan">Perempuan</option></select>
            </div>
            <div class="form-group"><label>ALAMAT</label><textarea id="f_alamat"></textarea></div>
            <div class="form-group"><label>KELURAHAN</label><input type="text" id="f_kel"></div>
            <div class="form-group"><label>KECAMATAN</label><input type="text" id="f_kec"></div>
            <div class="form-group"><label>KOTA</label><input type="text" id="f_kota"></div>
            <div class="form-group"><label>PROVINSI</label><input type="text" id="f_prov"></div>
            <div class="form-group"><label>KODE POS</label><input type="text" id="f_pos"></div>
            <div class="form-group"><label>AGAMA</label><input type="text" id="f_agama"></div>
            <div class="form-group"><label>PEKERJAAN</label><input type="text" id="f_kerja"></div>
            <div class="form-group"><label>HOBBY</label><input type="text" id="f_hobby"></div>
            <div class="form-group"><label>KOMITMEN</label><textarea id="f_komitmen"></textarea></div>
            <div class="member-buttons">
                <button class="btn-hapus" onclick="closeForm()">BATAL</button>
                <button style="background:#1faa58" class="btn-edit" onclick="simpanMember()">SIMPAN</button>
            </div>
        </div>
    </div>

    <input type="file" id="logoInput" hidden accept="image/*">

    <script>
        const USERNAME = "naafcfast@gmail.com";
        const PASSWORD = "Nafas130521";
        const STORE_LOGO = "NAFAS_APP_LOGO_DATA";
        const STORE_DB = "nafas_db";
        let currentPopupKey = "";
        let members = JSON.parse(localStorage.getItem(STORE_DB)) || [];

        function cekLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === USERNAME && p === PASSWORD) {
                document.getElementById('loginScreen').style.display = 'none';
                showPage('pageBeranda');
            } else { alert('Username atau Password Salah!'); }
        }

        window.onload = function() {
            const savedImg = localStorage.getItem(STORE_LOGO);
            if (savedImg) document.getElementById('logoDisplay').innerHTML = `<img src="${savedImg}">`;
            renderMembers();
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        const logoBtn = document.getElementById('logoBtn');
        const logoInput = document.getElementById('logoInput');
        logoBtn.onclick = () => logoInput.click();
        logoInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    localStorage.setItem(STORE_LOGO, event.target.result);
                    document.getElementById('logoDisplay').innerHTML = `<img src="${event.target.result}">`;
                };
                reader.readAsDataURL(file);
            }
        };

        function openPopup(title) {
            currentPopupKey = "naf_data_" + title.replace(/\s/g, "_");
            document.getElementById('popupTitleLabel').innerText = title;
            document.getElementById('popupText').value = localStorage.getItem(currentPopupKey) || "Belum ada data.";
            document.getElementById('popupText').readOnly = true;
            document.getElementById('popupOverlay').style.display = 'flex';
        }
        function closePopup() { document.getElementById('popupOverlay').style.display = 'none'; }
        function enableEdit() { document.getElementById('popupText').readOnly = false; document.getElementById('popupText').focus(); }
        function saveDataPopup() {
            localStorage.setItem(currentPopupKey, document.getElementById('popupText').value);
            document.getElementById('popupText').readOnly = true;
            alert("Berhasil disimpan!");
        }

        function saveDB() { localStorage.setItem(STORE_DB, JSON.stringify(members)); }

        function openFormTambah() {
            document.getElementById("formTitle").innerText = "TAMBAH MEMBER";
            document.getElementById("editIndex").value = "-1";
            clearForm();
            document.getElementById("formOverlay").classList.add("active");
        }

        function openFormEdit(idx) {
            const m = members[idx];
            document.getElementById("formTitle").innerText = "EDIT MEMBER";
            document.getElementById("editIndex").value = idx;
            document.getElementById("f_nama").value = m.nama;
            document.getElementById("f_id").value = m.id;
            document.getElementById("f_hp").value = m.hp;
            document.getElementById("f_ttl").value = m.ttl;
            document.getElementById("f_jk").value = m.jk;
            document.getElementById("f_alamat").value = m.alamat;
            document.getElementById("f_kel").value = m.kel || "";
            document.getElementById("f_kec").value = m.kec;
            document.getElementById("f_kota").value = m.kota;
            document.getElementById("f_prov").value = m.prov;
            document.getElementById("f_pos").value = m.pos;
            document.getElementById("f_agama").value = m.agama;
            document.getElementById("f_kerja").value = m.kerja;
            document.getElementById("f_hobby").value = m.hobby;
            document.getElementById("f_komitmen").value = m.komitmen;
            document.getElementById("formOverlay").classList.add("active");
        }

        function closeForm() { document.getElementById("formOverlay").classList.remove("active"); }
        function clearForm() { ["f_nama","f_id","f_hp","f_ttl","f_alamat","f_kel","f_kec","f_kota","f_prov","f_pos","f_agama","f_kerja","f_hobby","f_komitmen"].forEach(id=>document.getElementById(id).value=""); }

        function simpanMember() {
            const idx = parseInt(document.getElementById("editIndex").value);
            const data = {
                nama: document.getElementById("f_nama").value.toUpperCase(),
                id: document.getElementById("f_id").value,
                hp: document.getElementById("f_hp").value,
                ttl: document.getElementById("f_ttl").value,
                jk: document.getElementById("f_jk").value,
                alamat: document.getElementById("f_alamat").value,
                kel: document.getElementById("f_kel").value,
                kec: document.getElementById("f_kec").value,
                kota: document.getElementById("f_kota").value,
                prov: document.getElementById("f_prov").value,
                pos: document.getElementById("f_pos").value,
                agama: document.getElementById("f_agama").value,
                kerja: document.getElementById("f_kerja").value,
                hobby: document.getElementById("f_hobby").value,
                komitmen: document.getElementById("f_komitmen").value,
                foto: idx >= 0 ? members[idx].foto : ""
            };
            if(idx === -1) members.push(data); else members[idx] = data;
            saveDB(); renderMembers(); closeForm();
        }

        function renderMembers() {
            const list = document.getElementById("memberList");
            const q = document.getElementById("searchMember").value.toLowerCase();
            list.innerHTML = "";
            members.forEach((m, idx) => {
                if(m.nama.toLowerCase().includes(q) || m.id.includes(q)) {
                    const card = document.createElement("div");
                    card.className = "member-card";
                    card.innerHTML = `
                        <div class="member-header">
                            <div class="photo-ring"><img src="${m.foto || 'https://cdn-icons-png.flaticon.com/512/847/847969.png'}"></div>
                            <div class="member-name"><h4>${m.nama}</h4><div class="id">ID: ${m.id}</div></div>
                        </div>
                        <div class="member-grid">
                            <div class="field"><label>TTL</label><div>${m.ttl}</div></div>
                            <div class="field"><label>Jenis Kelamin</label><div>${m.jk}</div></div>
                            <div class="field full"><label>Alamat</label><div>${m.alamat}</div></div>
                            <div class="field"><label>Kelurahan</label><div>${m.kel || "-"}</div></div>
                            <div class="field"><label>Kecamatan</label><div>${m.kec}</div></div>
                            <div class="field"><label>Kota</label><div>${m.kota}</div></div>
                            <div class="field"><label>Provinsi</label><div>${m.prov}</div></div>
                            <div class="field"><label>Kode Pos</label><div>${m.pos}</div></div>
                            <div class="field"><label>Agama</label><div>${m.agama}</div></div>
                            <div class="field"><label>No HP</label><div>${m.hp}</div></div>
                            <div class="field"><label>Pekerjaan</label><div>${m.kerja}</div></div>
                            
                            <div class="field"><label>Hobby</label><div>${m.hobby}</div></div>
                            <div class="field"><label>Negara</label><div>Indonesia</div></div>
                            
                        </div>
                        <div class="komitmen-box"><h5>KOMITMEN</h5><p>${m.komitmen}</p></div>
                        <div class="icon-actions">
                            <div class="icon-btn" onclick="window.open('https://www.google.com/maps/search/'+encodeURIComponent('${m.alamat}'))"><img src="https://cdn-icons-png.flaticon.com/512/684/684908.png"><span>MAPS</span></div>
                            <div class="icon-btn" onclick="location.href='tel:${m.hp}'"><img src="https://cdn-icons-png.flaticon.com/512/724/724664.png"><span>TELP</span></div>
                            <div class="icon-btn" onclick="location.href='sms:${m.hp}'"><img src="https://cdn-icons-png.flaticon.com/512/724/724715.png"><span>SMS</span></div>
                            <div class="icon-btn" onclick="window.open('https://wa.me/62'+'${m.hp.substring(1)}')"><img src="https://cdn-icons-png.flaticon.com/512/733/733585.png"><span>WA</span></div>
                        </div>
                        <div class="member-buttons">
                            <button class="btn-wide" onclick="pilihFoto(${idx})">PILIH / GANTI FOTO</button>
                            <button class="btn-edit" onclick="openFormEdit(${idx})">EDIT</button>
                            <button class="btn-hapus" onclick="hapusMember(${idx})">HAPUS</button>
                            <button class="btn-kembali" onclick="showPage('pageBeranda')">KEMBALI</button>
                        </div>
                    `;
                    list.appendChild(card);
                }
            });
        }

        function pilihFoto(idx) {
            const inp = document.createElement("input"); inp.type="file"; inp.accept="image/*";
            inp.onchange = e => {
                const reader = new FileReader();
                reader.onload = f => { members[idx].foto = f.target.result; saveDB(); renderMembers(); };
                reader.readAsDataURL(e.target.files[0]);
            };
            inp.click();
        }

        function hapusMember(idx) { if(confirm("Hapus data member ini?")) { members.splice(idx,1); saveDB(); renderMembers(); } }
        function resetFoto() { if(confirm("Reset semua foto member?")) { members.forEach(m=>m.foto=""); saveDB(); renderMembers(); } }
        function exportCSV() {
            let csv = "ID,Nama,HP,TTL,Alamat,Kelurahan,Kecamatan,Kota,Provinsi,Agama,Pekerjaan,Hobby,Komitmen\n";
            members.forEach(m=> csv += `${m.id},${m.nama},${m.hp},${m.ttl},${m.alamat},${m.kel},${m.kec},${m.kota},${m.prov},${m.agama},${m.kerja},${m.hobby},${m.komitmen}\n`);
            const blob = new Blob([csv], {type:'text/csv'});
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href=url; a.download='data_member_nafas.csv'; a.click();
        }
    </script>
</body>
</html>
