<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layanan - AW Solutions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0a2463',
                        gold: '#f3d278',
                    },
                    fontFamily: {
                        sans: ['Arial', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow-sm {
                text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
            }
            .box-3d {
                box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06), 0 10px 15px -3px rgba(0, 0, 0, 0.1);
                border: 2px solid #f3d278;
                border-radius: 8px;
                background: linear-gradient(145deg, #1a3b7a, #0a2463);
            }
            .box-gold-3d {
                box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06), 0 10px 15px -3px rgba(0, 0, 0, 0.1);
                border-radius: 8px;
                background: linear-gradient(145deg, #f7d88f, #f3d278);
            }
            /* Tata letak responsif: 1 kolom di HP, 2 kolom di layar besar */
            .responsive-grid {
                display: grid;
                grid-template-columns: 1fr;
            }
            @media (min-width: 768px) {
                .responsive-grid {
                    grid-template-columns: 55fr 45fr;
                }
            }
        }
    </style>
</head>
<body class="font-sans bg-gray-50 text-primary">
    <!-- Halaman Layanan -->
    <section id="layanan" class="page-content">
        <div class="min-h-screen h-screen overflow-hidden bg-white flex flex-col">
            
            <!-- Bagian Judul Atas (Dirapatkan) -->
            <div class="py-2 px-4 text-center bg-gray-50 bg-[url('https://www.transparenttextures.com/patterns/paper-fibers.png')]">
                <h1 class="font-black text-[clamp(1.8rem,5vw,2.2rem)] text-primary tracking-wide leading-tight">Layanan Unggulan</h1>
                <h2 class="font-semibold text-[clamp(1rem,3vw,1.3rem)] text-gold relative inline-block pb-1 mt-0">
                    Jasa Tugas Diklat
                    <span class="absolute bottom-0 left-1/2 transform -translate-x-1/2 w-2/5 h-[2px] bg-gold"></span>
                </h2>
            </div>

            <!-- Pembatas Garis -->
            <div class="w-full h-[1px] bg-gray-200"></div>

            <!-- Konten Utama (Mengisi Ruang Tersedia) -->
            <div class="responsive-grid items-stretch flex-grow">
                
                <!-- Kolom Kiri: Tombol Layanan -->
                <div class="p-3 bg-gray-50 bg-[url('https://www.transparenttextures.com/patterns/paper-fibers.png')] flex flex-col justify-center gap-2 py-2">
                    
                    <!-- Kotak PKN (Teks Dinaikkan & Diringkas) -->
                    <div class="box-3d text-white p-3 cursor-pointer" onclick="toggleContent('pkn-content', 'pkn-icon')">
                        <div class="flex items-center gap-2 mb-1">
                            <i class="fa fa-th-large text-gold text-lg"></i>
                            <h3 class="font-bold text-lg text-gold">PKN</h3>
                        </div>
                        <p class="text-gray-100 text-sm pl-6 leading-tight">(Pelatihan Kepemimpinan Nasional)</p>
                        <p class="text-gray-100 text-sm pl-6 leading-tight mt-0.5">Tingkat II & Tingkat I</p>
                    </div>

                    <!-- Kotak PKA (Teks Dinaikkan) -->
                    <div class="bg-primary text-white p-3 rounded-lg shadow-lg cursor-pointer" style="box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); background: linear-gradient(145deg, #1a3b7a, #0a2463); border-radius: 8px;" onclick="toggleContent('pka-content', 'pka-icon')">
                        <div class="flex items-center gap-2 mb-1">
                            <i class="fa fa-plus-square-o text-gold text-lg"></i>
                            <h3 class="font-bold text-lg text-gold">PKA</h3>
                        </div>
                        <p class="text-gray-100 text-sm pl-6 leading-tight">(Pelatihan Kepemimpinan Administrator)</p>
                    </div>

                    <!-- Kotak PKP (Teks Dinaikkan) -->
                    <div class="bg-primary text-white p-3 rounded-lg shadow-lg cursor-pointer" style="box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); background: linear-gradient(145deg, #1a3b7a, #0a2463); border-radius: 8px;" onclick="toggleContent('pkp-content', 'pkp-icon')">
                        <div class="flex items-center gap-2 mb-1">
                            <i class="fa fa-sun-o text-gold text-lg"></i>
                            <h3 class="font-bold text-lg text-gold">PKP</h3>
                        </div>
                        <p class="text-gray-100 text-sm pl-6 leading-tight">(Pelatihan Kepemimpinan Pengawas)</p>
                    </div>

                    <!-- Kotak Desain & Cetak -->
                    <div class="box-gold-3d text-primary p-3 cursor-pointer" onclick="toggleContent('cetak-content', 'cetak-icon')">
                        <div class="flex items-center gap-2">
                            <i class="fa fa-file-text-o text-primary text-lg"></i>
                            <h3 class="font-bold text-lg text-primary">Design / Cetak</h3>
                        </div>
                    </div>

                </div>

                <!-- Kolom Kanan: Gambar Gedung (Mengisi Sisa Layar) -->
                <div class="h-[150px] md:h-auto relative overflow-hidden bg-gray-200">
                    <img src="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Gedung Kantor" class="w-full h-full object-cover object-center">
                </div>

            </div>

            <!-- Bagian Hak Cipta Bawah -->
            <div class="bg-primary py-2 px-6 text-center text-gold flex-shrink-0">
                <p class="text-xs">Copyright © 2026 AW Solutions - Penyedia Jasa</p>
                <p class="text-xs mt-0.5">Tugas Diklat PKN, PKA, PKP</p>
            </div>

        </div>
    </section>

    <!-- Skrip untuk fungsi klik -->
    <script>
        function toggleContent(contentId, iconId) {
            console.log('Tombol ' + contentId + ' diklik!');
        }
    </script>
</body>
</html>
