<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio Furnitur</title>
    <style>
        body {
            font-family: 'Times New Roman', Times, serif; /* Menggunakan font serif agar mirip */
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: start;
            min-height: 100vh;
        }
        .container {
            background-color: white;
            padding: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 480px; /* Lebar maksimal untuk HP potret */
        }
        .portfolio-title {
            text-align: center;
            font-size: 32px; /* Diperbesar agar mirip */
            font-weight: bold;
            margin-top: 15px;
            margin-bottom: 25px;
            color: #001F3F; /* Warna biru tua yang sama */
        }
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* Susunan 4 kolom kesamping */
            grid-template-rows: repeat(3, auto); /* Susunan 3 baris ke bawah */
            gap: 8px; /* Jarak antar kotak dikurangi */
            margin-bottom: 20px;
        }
        .portfolio-item {
            border: 2px solid #FFD700; /* Bingkai kuning yang lebih tebal */
            overflow: hidden;
            display: flex;
            flex-direction: column;
            aspect-ratio: 1/1; /* Memastikan setiap kotak tetap kotak sempurna */
        }
        .portfolio-image {
            width: 100%;
            height: auto;
            flex-grow: 1; /* Agar gambar mengisi sisa ruang */
            object-fit: cover;
            object-position: center;
        }
        .portfolio-info {
            background-color: #FFD700; /* Warna latar kuning yang sama */
            padding: 4px; /* Padding dikurangi */
            display: flex;
            align-items: center;
            justify-content: start;
            border-top: 1px solid #FFD700; /* Garis tipis pemisah */
        }
        .portfolio-info img {
            width: 16px; /* Ukuran ikon mata */
            margin-right: 3px;
        }
        .portfolio-info span {
            font-size: 11px; /* Teks diperkecil agar pas */
            color: black;
            font-weight: bold;
        }
        .copyright-box {
            background-color: #001F3F; /* Warna latar biru tua */
            padding: 15px;
            text-align: center;
            margin-top: 10px;
            width: calc(100% + 20px); /* Menutupi padding container */
            margin-left: -10px;
        }
        .copyright-text {
            color: #FFD700; /* Warna teks kuning */
            font-size: 14px;
            margin: 0;
        }
    </style>
</head>
