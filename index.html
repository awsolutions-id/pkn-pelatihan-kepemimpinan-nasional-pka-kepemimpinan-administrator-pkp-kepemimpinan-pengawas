<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beranda - AW Solutions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            overflow-x: hidden;
            width: 100%;
        }

        /* WARNA SESUAI HALAMAN LAYANAN */
        :root {
            --warna-biru: #002B5B;
            --warna-emas: #F5D061;
        }

        /* BACKGROUND DENGAN LAPISAN BIRU TUA MERATA */
        .hero-section {
            background-image: url('Latar Mengetik 01.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            min-height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .hero-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--warna-biru);
            opacity: 0.75;
            z-index: 1;
        }

        /* Agar konten berada di atas lapisan warna */
        .content-wrapper {
            position: relative;
            z-index: 2;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            width: 100%;
        }

        /* NAVBAR */
        .navbar {
            background-color: var(--warna-biru);
            padding: 15px 0;
            position: relative;
            z-index: 3;
            width: 100%;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin: 0 12px;
            font-size: 1.2rem;
            font-weight: 500;
            padding-bottom: 5px;
            border-bottom: 3px solid transparent;
            transition: 0.3s;
        }

        /* HANYA YANG AKTIF YANG ADA GARIS */
        .navbar a.active {
            border-bottom: 3px solid white;
        }
    </style>
</head>
<body>

    <!-- NAVBAR MENU -->
    <div class="navbar flex justify-center">
        <a href="#" class="active">Beranda</a>
        <a href="#">Profil</a>
        <a href="#">Layanan</a>
        <a href="#">Portofolio</a>
        <a href="#">Kontak</a>
    </div>

    <!-- HERO SECTION -->
    <div class="hero-section">
        <div class="content-wrapper">
            
            <p style="color: white; font-size: 1.2rem; margin-bottom: 10px;">pengetikan desain dan cetak</p>

            <!-- JUDUL DIJADIKAN 1 BARIS -->
            <h1 style="color: white; font-size: clamp(2.5rem, 8vw, 4rem); font-weight: bold; margin-bottom: 20px; white-space: nowrap;">
                Jasa Tugas Diklat
            </h1>

            <!-- TULISAN DENGAN ICON DAN SINGKATAN -->
            <p style="color: white; font-size: clamp(1rem, 3vw, 1.5rem); max-width: 90%; line-height: 1.8; margin-bottom: 40px;">
                <i class="fas fa-th-large" style="color: var(--warna-emas); margin-right: 8px;"></i>
                PKN Pelatihan Kepemimpinan Nasional, TK. II dan TK. I
                <br>
                <i class="fas fa-plus-square" style="color: var(--warna-emas); margin-right: 8px;"></i>
                PKA Pelatihan Kepemimpinan Administrator
                <br>
                <i class="fas fa-certificate" style="color: var(--warna-emas); margin-right: 8px;"></i>
                PKP Pelatihan Kepemimpinan Pengawas
            </p>

            <!-- TULISAN DI ATAS TOMBOL -->
            <p style="color: white; font-size: 0.9rem; margin-bottom: 20px;">
                "Solusi Lengkap untuk Kebutuhan Tugas Diklat Anda"
            </p>

            <!-- TOMBOL SUDAH DILINKKE KE HALAMAN LAYANAN -->
            <a href="layanan.html" style="text-decoration: none;">
                <button style="background-color: white; color: var(--warna-biru); padding: 15px 30px; font-size: 1.5rem; font-weight: bold; border: none; border-radius: 8px; cursor: pointer;">
                    Mulai Sekarang
                </button>
            </a>

        </div>
    </div>

</body>
</html>
