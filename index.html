<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio - AW Solutions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0a2463', // Warna biru tua sesuai desain
                        gold: '#f3d278',     // Warna kuning emas untuk bingkai
                    },
                    fontFamily: {
                        sans: ['Arial', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-stroke {
                -webkit-text-stroke: 1px rgba(10, 36, 99, 0.2);
            }
            .kotak-foto {
                @apply w-full aspect-square border-4 border-gold rounded-md overflow-hidden flex flex-col;
            }
            .label-detail {
                @apply bg-gold text-primary font-bold text-base py-3 px-4 w-full text-left;
            }
        }
    </style>
</head>
<body class="bg-white font-sans">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <!-- Judul Portofolio -->
        <div class="text-center mb-10">
            <h1 class="text-[clamp(2.5rem,8vw,5rem)] font-black text-primary text-stroke">Portofolio</h1>
            <div class="w-24 h-1 bg-gold mx-auto mt-2"></div>
        </div>

        <!-- Grid 12 Kotak Foto (4 kolom, 3 baris) -->
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <!-- Kotak 1 -->
            <div class="kotak-foto">
                <img src="https://picsum.photos/id/1067/400/400" alt="Hasil Kerja 1" class="w-full h-full object-cover">
                <div class="label-detail">Lihat Detail</div>
            </div>

            <!-- Kotak 2 -->
            <div class="kotak-foto">
                <img src="https://picsum.photos/id/1059/400/400" alt="Hasil Kerja 2" class="w-full h-full object-cover">

            <!-- Kotak 7 -->

            </div>

            <!-- Kotak 8 -->
