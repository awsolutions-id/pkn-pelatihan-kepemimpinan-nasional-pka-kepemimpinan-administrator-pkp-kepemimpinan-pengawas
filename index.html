<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layanan - AW Solutions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0a2463',
                        gold: '#f3d278',
                    },
                    fontFamily: {
                        sans: ['Arial', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow-sm {
                text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
            }
            .box-3d {
                box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06), 0 10px 15px -3px rgba(0, 0, 0, 0.1);
                border: 2px solid #f3d278;
                border-radius: 8px;
                background: linear-gradient(145deg, #1a3b7a, #0a2463);
            }
            .box-gold-3d {
                box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06), 0 10px 15px -3px rgba(0, 0, 0, 0.1);
                border-radius: 8px;
                background: linear-gradient(145deg, #f7d88f, #f3d278);
            }
        }
    </style>
</head>
<body class="font-sans bg-gray-50 text-primary">
    <!-- Halaman Layanan -->
    <section id="layanan" class="page-content">
        <div class="min-h-screen h-auto overflow-hidden bg-white">
            
            <!-- Bagian Judul Atas -->
            <div class="py-16 px-6 text-center bg-gray-50 bg-[url('https://www.transparenttextures.com/patterns/paper-fibers.png')]">
                <h1 class="font-black text-[clamp(2.5rem,6vw,4rem)] text-primary tracking-wide">Layanan Unggulan</h1>
                <h2 class="font-semibold text-[clamp(2rem,5vw,3rem)] text-gold relative inline-block pb-4 mt-2">
                    Jasa Tugas Diklat
                    <span class="absolute bottom-0 left-1/2 transform -translate-x-1/2 w-4/5 h-[3px] bg-gold"></span>
                </h2>
                <p class="text-gold font-medium mt-2 text-lg">#f3d278</p>
            </div>

            <!-- Pembatas Garis -->
            <div class="w-full h-[2px] bg-gray-200"></div>

            <!-- Konten Utama (Dua Kolom) -->
            <div class="flex flex-col md:flex-row items-stretch">
                
                <!-- Kolom Kiri: Tombol Layanan -->
                <div class="w-full md:w-1/2 p-8 bg-gray-50 bg-[url('https://www.transparenttextures.com/patterns/paper-fibers.png')] flex flex-col justify-center gap-6 py-12">
                    
                    <!-- Kotak PKN -->
                    <div class="box-3d text-white p-5 flex items-center gap-4 cursor-pointer" onclick="toggleContent('pkn-content', 'pkn-icon')">
                        <i class="fa fa-shield text-gold text-3xl"></i>
                        <div class="text-left leading-tight">
                            <h3 class="font-bold text-2xl text-gold">PKN</h3>
                            <p class="text-gray-100 text-base">(Pelatihan Kepemimpinan Nasional)</p>
                            <p class="text-gray-100 text-base">Tingkat II dan Tingkat I</p>
                        </div>
                    </div>

                    <!-- Kotak PKA -->
                    <div class="bg-primary text-white p-5 rounded-lg shadow-lg flex items-center gap-4 cursor-pointer" style="box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); background: linear-gradient(145deg, #1a3b7a, #0a2463); border-radius: 8px;" onclick="toggleContent('pka-content', 'pka-icon')">
                        <i class="fa fa-shield text-gold text-3xl"></i>
                        <div class="text-left leading-tight">
                            <h3 class="font-bold text-2xl text-gold">PKA</h3>
                            <p class="text-gray-100 text-base">(Pelatihan Kepemimpinan Administrator)</p>
                        </div>
                    </div>

                    <!-- Kotak PKP -->
                    <div class="bg-primary text-white p-5 rounded-lg shadow-lg flex items-center gap-4 cursor-pointer" style="box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); background: linear-gradient(145deg, #1a3b7a, #0a2463); border-radius: 8px;" onclick="toggleContent('pkp-content', 'pkp-icon')">
                        <i class="fa fa-shield text-gold text-3xl"></i>
                        <div class="text-left leading-tight">
                            <h3 class="font-bold text-2xl text-gold">PKP</h3>
                            <p class="text-gray-100 text-base">(Pelatihan Kepemimpinan Pengawas)</p>
                        </div>
                    </div>

                    <!-- Kotak Desain & Cetak -->
                    <div class="box-gold-3d text-primary p-5 flex items-center gap-4 cursor-pointer" onclick="toggleContent('cetak-content', 'cetak-icon')">
                        <i class="fa fa-shield text-primary text-3xl"></i>
                        <div class="text-left leading-tight">
                            <h3 class="font-bold text-2xl text-primary">Design / Cetak</h3>
                        </div>
                    </div>

                </div>

                <!-- Kolom Kanan: Gambar Gedung -->
                <div class="w-full md:w-1/2 h-[550px] md:h-auto relative overflow-hidden bg-gray-200">
                    <img src="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Gedung Kantor" class="w-full h-full object-cover object-center">
                </div>

            </div>

            <!-- Bagian Hak Cipta Bawah -->
            <div class="bg-primary py-6 px-6 text-center text-gold">
                <p class="text-lg">Copyright © 2026 AW Solutions - Penyedia Jasa</p>
                <p class="text-md mt-1">Tugas Diklat PKN, PKA, PKP</p>
            </div>

        </div>
    </section>

    <!-- Skrip untuk fungsi klik -->
    <script>
        function toggleContent(contentId, iconId) {
            // Bisa ditambahkan logika untuk membuka/tutup detail di sini
            console.log('Tombol ' + contentId + ' diklik!');
        }
    </script>

</body>
</html>
